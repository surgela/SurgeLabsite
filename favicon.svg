<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000000"/>

  <defs>
    <clipPath id="flask-clip">
      <path d="M33 5 L33 38 L8 78 Q4 86 8 92 Q12 97 20 97 L80 97 Q88 97 92 92 Q96 86 92 78 L67 38 L67 5 Z"/>
    </clipPath>
    <linearGradient id="teal-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00C49A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00C49A"/>
    </linearGradient>
  </defs>

  <!-- Flask body -->
  <path d="M33 5 L33 38 L8 78 Q4 86 8 92 Q12 97 20 97 L80 97 Q88 97 92 92 Q96 86 92 78 L67 38 L67 5 Z"
        fill="#000000" stroke="white" stroke-width="4" stroke-linejoin="round"/>

  <!-- Teal liquid -->
  <rect x="0" y="72" width="100" height="30" fill="url(#teal-grad)" clip-path="url(#flask-clip)"/>

  <!-- Chart line -->
  <polyline points="18,84 34,64 50,72 66,50 82,28"
            fill="none" stroke="#00C49A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"
            clip-path="url(#flask-clip)"/>

  <!-- Arrow head -->
  <polygon points="82,28 72,32 76,42" fill="#00C49A"/>

  <!-- Neck top bar -->
  <rect x="30" y="2" width="40" height="6" rx="3" fill="white"/>
</svg>
